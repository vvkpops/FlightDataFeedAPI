<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Flight Data Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/admin/css/admin.css" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper">
    <div class="card login-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-airplane-engines fs-1 text-primary"></i>
          <h4 class="mt-2">Flight Data Admin</h4>
          <p class="text-muted small">Sign in to manage your flight data feed</p>
        </div>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required>
          </div>
          <div id="loginError" class="alert alert-danger d-none small"></div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      errEl.classList.add('d-none');
      try {
        const res = await fetch('/admin/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          window.location.href = '/admin/';
        } else {
          const data = await res.json();
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('d-none');
        }
      } catch (err) {
        errEl.textContent = 'Network error';
        errEl.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
